<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SnapRewrite Installation Guide</title>
  <meta name="description" content="Redirecting to language-specific installation guide." />
</head>
<body>
  <script>
    const lang = (localStorage.getItem("sr.lang")
      || localStorage.getItem("snaprewrite.site.lang")
      || (navigator.language || "")).toLowerCase();
    const target = lang.startsWith("zh") ? "install-zh.html" : "install-en.html";
    location.replace(target);
  </script>
  <p>Redirecting to Installation Guide...</p>
</body>
</html>
